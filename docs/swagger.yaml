definitions:
  database.Event:
    properties:
      date:
        type: string
      description:
        minLength: 10
        type: string
      id:
        type: integer
      location:
        minLength: 3
        type: string
      name:
        minLength: 3
        type: string
      ownerId:
        type: integer
    required:
    - date
    - description
    - location
    - name
    type: object
info:
  contact: {}
  description: This is a sample REST API server written in Go using the Gin framework.
  title: REST API in Go
  version: "1.0"
paths:
  /api/v1/events:
    get:
      consumes:
      - application/json
      description: Get a list of all events
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/database.Event'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all events
      tags:
      - Events
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and then your JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
